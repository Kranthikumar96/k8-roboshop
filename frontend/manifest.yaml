# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: frontend
#   namespace: roboshop
#   labels:
#     project: roboshop
#     environment: dev
#     tier: web
#     component: frontend
#     env: dev
# data:
#   CART_ENDPOINT:  "cart:8080"
#   DB_HOST:  "mysql"
---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: frontend
  namespace: roboshop
  # deployment labels
  labels:
    project: roboshop
    environment: dev
    tier: web
    component: frontend
spec:
  replica: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: web
      component: frontend
  # This is pod definition
  template:
    metadata:
      labels: 
        project: roboshop
        environment: dev
        tier: web
        component: frontend
    spec:
      containers:
      - name: frontend
        image: kranthikumar96/frontend:v1
        # envFrom:
        # - configMapRef:
        #   name: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: web
    component: frontend
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    environment: dev
    tier: web
    component: frontend
  ports:
  - protocol: TCP
    port: 80  # service port
    targetport: 80  # container port