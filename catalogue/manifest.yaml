apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: app
    component: catalogue
    env: dev
data:
  MONGO:  "true"
  MONGO_URL:  "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: catalogue
  namespace: roboshop
  # deployment labels
  labels:
    project: roboshop
    environment: dev
    tier: app
    component: catalogue
spec:
  replica: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: app
      component: catalogue
  # This is pod definition
  template:
    metadata:
      labels: 
        project: roboshop
        environment: dev
        tier: app
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: kranthikumar96/catalogue:v1
        envFrom:
        - configMapRef:
          name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: app
    component: catalogue
spec:
  selector:
    project: roboshop
    environment: dev
    tier: app
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080  # service port
    targetport: 8080  # container port