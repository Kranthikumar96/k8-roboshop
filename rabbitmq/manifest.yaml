apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: rabbitmq
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: "cm9ib3Nob3A="
  RABBITMQ_DEFAULT_PASS: "cm9ib3Nob3AxMjM="
---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: rabbitmq
  namespace: roboshop
  # deployment labels
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: rabbitmq
spec:
  replica: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: database
      component: rabbitmq
  # This is pod definition
  template:
    metadata:
      labels: 
        project: roboshop
        environment: dev
        tier: database
        component: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        envFrom:
        - secretRef:
          name: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: rabbitmq
spec:
  selector:
    project: roboshop
    environment: dev
    tier: database
    component: rabbitmq
  ports:
  - protocol: TCP
    port: 5672  # service port
    targetport: 5672  # container port