apiVersion: apps/v1
kind: Deployment 
metadata:
  name: redis
  namespace: roboshop
  # deployment labels
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: redis
spec:
  replica: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: database
      component: redis
  # This is pod definition
  template:
    metadata:
      labels: 
        project: roboshop
        environment: dev
        tier: database
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: redis
spec:
  selector:
    project: roboshop
    environment: dev
    tier: database
    component: redis
  ports:
  - protocol: TCP
    port: 6379  # service port
    targetport: 6379  # container port