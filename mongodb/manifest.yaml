apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mongodb
  namespace: roboshop
  # deployment labels
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: mongodb
spec:
  replica: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: database
      component: mongodb
  # This is pod definition
  template:
    metadata:
      labels: 
        project: roboshop
        environment: dev
        tier: database
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: kranthikumar96/mongodb:v1
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: database
    component: mongodb
spec:
  selector:
    project: roboshop
    environment: dev
    tier: database
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017  # service port
    targetport: 27017  # container port